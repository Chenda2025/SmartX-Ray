services:
  # ── Flask Web Service ───────────────────────────────────────────────────────
  - type: web
    name: smartxray
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: flask db upgrade && gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smartxray-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        value: ""           # leave blank — Render free tier has no Redis; background tasks disabled
      # ── Optional: fill these in the Render dashboard ────────────────────────
      # - key: MAIL_SERVER
      #   value: smtp.gmail.com
      # - key: MAIL_PORT
      #   value: "587"
      # - key: MAIL_USERNAME
      #   sync: false
      # - key: MAIL_PASSWORD
      #   sync: false
      # - key: TELEGRAM_BOT_TOKEN
      #   sync: false
      # - key: TELEGRAM_CHAT_ID
      #   sync: false
      # - key: STRIPE_SECRET_KEY
      #   sync: false
      # - key: STRIPE_PRICE_MONTHLY
      #   sync: false
      # - key: STRIPE_PRICE_YEARLY
      #   sync: false

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
databases:
  - name: smartxray-db
    databaseName: smartxray
    plan: free
    region: singapore

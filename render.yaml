services:
  # ── Flask Web Service ───────────────────────────────────────────────────────
  - type: web
    name: smartxray
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/download_model.py && flask db upgrade && python scripts/create_admin.py
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production

      # ── Database (auto-filled from the DB below) ──────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: smartxray-db
          property: connectionString

      # ── Auto-generated secrets ────────────────────────────────────────────
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

      # ── AI Model ──────────────────────────────────────────────────────────
      # Set MODEL_URL to the direct download link of best_model.onnx  ← PREFERRED (lowest RAM)
      # Falls back to .tflite then .h5 if ONNX is unavailable.
      # Recommended hosts:
      #   GitHub Releases → https://github.com/USER/REPO/releases/download/v1.0/best_model.onnx
      #   Hugging Face    → https://huggingface.co/USER/REPO/resolve/main/best_model.onnx
      - key: MODEL_URL
        sync: false       # fill in the Render dashboard — do NOT commit the URL here
      # Optional: SHA-256 checksum for integrity verification (leave blank to skip)
      - key: MODEL_SHA256
        sync: false

      # ── Redis (no free tier on Render — leave blank, background tasks off) ─
      - key: REDIS_URL
        value: ""

      # ── Email ─────────────────────────────────────────────────────────────
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        value: noreply@smartxray.com

      # ── Telegram alerts ───────────────────────────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

      # ── Admin account (created by scripts/create_admin.py at deploy time) ──
      - key: ADMIN_EMAIL
        sync: false       # e.g. admin@smartxray.com
      - key: ADMIN_PASSWORD
        sync: false       # strong password
      - key: ADMIN_NAME
        value: Admin

      # ── Public base URL (used in emails and Stripe redirects) ─────────────
      - key: APP_BASE_URL
        sync: false       # e.g. https://smartxray.onrender.com  (no trailing slash)

      # ── Stripe (leave blank to disable payments) ──────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_YEARLY
        sync: false

# ── PostgreSQL Database ─────────────────────────────────────────────────────
databases:
  - name: smartxray-db
    databaseName: smartxray
    plan: free
    region: singapore

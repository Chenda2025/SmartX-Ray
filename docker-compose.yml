version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       smartxray
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker) ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── Flask app ──────────────────────────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/smartxray
      REDIS_URL:    redis://redis:6379/0
      FLASK_ENV:    production
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./static/heatmaps:/app/static/heatmaps
      - ./static/reports:/app/static/reports
      - ./models:/app/models          # mount the .h5 model
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      sh -c "flask db upgrade && gunicorn 'app:create_app()'
             --bind 0.0.0.0:5000 --workers 2 --timeout 120"

volumes:
  pgdata:

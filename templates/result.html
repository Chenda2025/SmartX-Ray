{% extends "base.html" %}
{% block title %}Scan Result{% endblock %}

{% block content %}
<div class="container py-4">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/dashboard" data-i18n="result_breadcrumb">Dashboard</a></li>
      <li class="breadcrumb-item active">Scan #{{ scan_id }}</li>
    </ol>
  </nav>

  <div id="resultContent">
    <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  if (!Auth.requireLogin()) { /* redirected */ }

  const SCAN_ID = {{ scan_id }};

  async function loadResult() {
    const res  = await api.get(`/scan/${SCAN_ID}`);
    const data = await res.json();
    if (!res.ok) {
      document.getElementById("resultContent").innerHTML =
        `<div class="alert alert-danger">${data.error || I18n.t("result_not_found")}</div>`;
      return;
    }
    renderResult(data);
  }

  function renderResult(s) {
    const isPneumonia = s.prediction === "PNEUMONIA";
    const confPct     = s.confidence?.toFixed(2) ?? "–";
    const badgeCls    = isPneumonia ? "badge-pneumonia" : "badge-normal";
    const barColor    = isPneumonia ? "bg-danger" : "bg-success";
    const dateStr     = s.created_at ? new Date(s.created_at).toLocaleString() : "–";
    const user        = User.get();
    const isPro       = user?.tier === "pro";

    const imageUrl   = s.image_url   || (s.image_path   ? `/static/${s.image_path}`   : "");
    const heatmapUrl = s.heatmap_url || (s.heatmap_path ? `/static/${s.heatmap_path}` : "");

    const reportSection = isPro && s.report_id
      ? `<a href="/api/scan/report/${s.report_id}/download" class="btn btn-warning fw-bold">
           <i class="fa-solid fa-file-pdf me-2"></i>${I18n.t("result_pdf_btn")}
         </a>`
      : !isPro
      ? `<div class="alert alert-warning d-flex align-items-center gap-2 mt-2">
           <i class="fa-solid fa-lock"></i>
           <div>${I18n.t("result_pdf_locked")}</div>
         </div>`
      : `<p class="text-muted small">${I18n.t("result_generating")}</p>`;

    const adSection = !isPro && s.ad
      ? `<div class="card ad-card mt-4 p-3">
           <span class="ad-label">${I18n.t("dash_advertisement")}</span>
           <div class="d-flex align-items-center gap-3 mt-2">
             ${s.ad.image_url ? `<img src="${s.ad.image_url}" alt="ad" style="height:52px;border-radius:8px;">` : ""}
             <div class="flex-grow-1">
               <div class="fw-semibold small">${s.ad.title}</div>
               <div class="text-muted small">${s.ad.body}</div>
             </div>
             <a href="#" onclick="adClick(${s.ad.id}, '${s.ad.target_url}')" class="btn btn-sm btn-outline-secondary flex-shrink-0">${I18n.t("dash_learn_more")}</a>
           </div>
         </div>`
      : "";

    const noImageHtml = `<div class="bg-dark d-flex align-items-center justify-content-center" style="height:260px;">
                           <span class="text-secondary small">${I18n.t("result_no_image")}</span>
                         </div>`;
    const noHeatHtml  = `<div class="bg-dark d-flex align-items-center justify-content-center" style="height:260px;">
                           <span class="text-secondary small">${s.gradcam_status === "failed" ? I18n.t("result_heatmap_unavail") : I18n.t("result_generating_hm")}</span>
                         </div>`;

    document.getElementById("resultContent").innerHTML = `
      <div class="row g-4">
        <div class="col-lg-5">
          <div class="card p-4 h-100">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div>
                <p class="text-muted small mb-1">Scan #${s.id} &nbsp;·&nbsp; ${dateStr}</p>
                <span class="badge ${badgeCls} fs-5 px-3 py-2">${s.prediction}</span>
              </div>
              <span class="badge bg-light text-secondary">${s.model_version || "v1.0"}</span>
            </div>

            <p class="text-muted small mb-1 mt-3">${I18n.t("result_confidence")}</p>
            <div class="d-flex align-items-center gap-2 mb-1">
              <div class="progress flex-grow-1 conf-bar">
                <div class="progress-bar ${barColor}" style="width:${confPct}%"></div>
              </div>
              <span class="fw-bold">${confPct}%</span>
            </div>

            <p class="small text-muted mt-3">
              ${isPneumonia ? I18n.t("result_pneumonia_msg") : I18n.t("result_normal_msg")}
            </p>

            <div class="mt-3">${reportSection}</div>

            <hr>
            <div class="d-flex gap-2 flex-wrap">
              <a href="/dashboard" class="btn btn-outline-secondary btn-sm">
                <i class="fa-solid fa-arrow-left me-1"></i>${I18n.t("result_back")}
              </a>
              <a href="/marketplace" class="btn btn-outline-primary btn-sm">
                <i class="fa-solid fa-user-doctor me-1"></i>${I18n.t("result_find_doctor")}
              </a>
            </div>

            ${adSection}
          </div>
        </div>

        <div class="col-lg-7">
          <div class="row g-3">
            <div class="col-md-6">
              <p class="fw-semibold small mb-2">
                <i class="fa-solid fa-image me-1 text-brand"></i>${I18n.t("result_original")}
              </p>
              <div class="img-viewer">
                ${imageUrl ? `<img src="${imageUrl}" alt="X-Ray" loading="lazy" />` : noImageHtml}
              </div>
            </div>
            <div class="col-md-6">
              <p class="fw-semibold small mb-2">
                <i class="fa-solid fa-fire me-1 text-danger"></i>${I18n.t("result_heatmap")}
                <span class="badge bg-info text-dark ms-1 small">${I18n.t("result_xai_badge")}</span>
              </p>
              <div class="img-viewer">
                ${heatmapUrl ? `<img src="${heatmapUrl}" alt="Grad-CAM" loading="lazy" />` : noHeatHtml}
              </div>
            </div>
          </div>

          <div class="card mt-3 p-3">
            <p class="fw-semibold small mb-2">
              <i class="fa-solid fa-info-circle text-brand me-1"></i>${I18n.t("result_legend_title")}
            </p>
            <div class="d-flex align-items-center gap-2 small text-muted">
              <div style="width:120px;height:14px;border-radius:4px;background:linear-gradient(to right,#00f,#0f0,#ff0,#f00);"></div>
              <span>${I18n.t("result_legend_desc")}</span>
            </div>
            <p class="small text-muted mt-2 mb-0">${I18n.t("result_legend_body")}</p>
          </div>
        </div>
      </div>

      <div class="alert alert-secondary small mt-4">
        <i class="fa-solid fa-triangle-exclamation me-1"></i>
        ${I18n.t("result_disclaimer")}
      </div>`;
  }

  async function adClick(adId, targetUrl) {
    await fetch(`/api/ads/${adId}/click`, { method: "POST" });
    window.open(targetUrl, "_blank");
  }

  loadResult();
</script>
{% endblock %}
